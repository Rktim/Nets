[project]
name = "nets"
version = "0.1.0"
description = "A lightweight deep learning framework built from scratch using NumPy"
authors = [{name = "Raktim Klaita",email = "raktmxx@gmail.com"}]
dependencies = [
    "numpy",
    "plotly",
    "dash",
    "scikit-learn"
]